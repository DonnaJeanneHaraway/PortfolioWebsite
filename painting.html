<script>
    const imageSrcs = [
        'assets/toWEBP_Painting/HollyWell.webp',

        'assets/toWEBP_Painting/Pre2025_Paintings00010.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00011.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00012.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00013.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00014.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00016.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00017.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00018.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00019.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00020.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00021.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00023.webp',
        'assets/toWEBP_Painting/Underworld.webp',
    ];

    // Process images: Irkutsk — built FIRST so they are 1, 2, 3 in lightbox
    const processSrcs = [
        'assets/toWEBP_Painting/Pre2025_Paintings00003.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00002.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00001.webp',

    // Single source of truth for sold paintings
    const soldPaintings = [
        'assets/toWEBP_Painting/Pre2025_Paintings00003.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00002.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00001.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00017.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00000.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00004.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00018.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00012.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00006.webp',
        'assets/toWEBP_Painting/Pre2025_Paintings00023.webp'
    ];

    // Painting info: title and size for available paintings
    const paintingInfo = {
        'assets/toWEBP_Painting/HollyWell.webp': { title: 'Holy Well', size: '20x28"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00008.webp': { title: 'High Gate', size: '13x30"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00016.webp': { title: 'Benched', size: '20x28"' },
        'assets/toWEBP_Painting/landscape.webp': { title: 'Fooled', size: '12x9"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00010.webp': { title: 'Lila in Snow', size: '16x20"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00011.webp': { title: 'Gates', size: '16x20"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00019.webp': { title: 'Disabled Dog 1', size: '10x8"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00005.webp': { title: 'Pupil', size: '8x10"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00020.webp': { title: 'Disabled Dog 2', size: '8x10"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00013.webp': { title: 'Telephone Booth', size: '20x20"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00014.webp': { title: 'Pretty Sick', size: '6x6"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00007.webp': { title: 'Night Derby', size: '16x20"' },
        'assets/toWEBP_Painting/Underworld.webp': { title: 'Underworld', size: '12x9"' },
        'assets/toWEBP_Painting/Pre2025_Paintings00021.webp': { title: 'Hatched', size: '8x10"' }
    };

    function thumbnailSrc(src) {
        return src
            .replace('assets/toWEBP_Painting/', 'assets/thumbs/toWEBP_Painting/')
            .replace('assets/toWEBP_Illustration/', 'assets/thumbs/toWEBP_Illustration/')
            .replace(/ /g, '%20');
    }

    function friendlyName(src) {
        const index = visualDisplayIndex(src);
        return 'painting no. ' + (index + 1).toString().padStart(2, '0');
    }

    // Build gallery
    const gallery = document.getElementById('gallery');
    const galleryImages = [];
    const galleryEntries = [];

    function visualEntries() {
        return [...galleryEntries].sort((a, b) => {
            const aRect = a.item.getBoundingClientRect();
            const bRect = b.item.getBoundingClientRect();
            const topDiff = aRect.top - bRect.top;
            if (Math.abs(topDiff) > 12) return topDiff;
            return aRect.left - bRect.left;
        });
    }

    function syncGalleryImagesToVisualOrder() {
        galleryImages.length = 0;
        visualEntries().forEach(entry => galleryImages.push(entry.img));
    }

    function visualDisplayIndex(src) {
        const index = visualEntries().findIndex(entry => entry.src === src);
        return index === -1 ? [...processSrcs, ...imageSrcs].indexOf(src) : index;
    }

    function openLightboxForSrc(src) {
        syncGalleryImagesToVisualOrder();
        const index = galleryImages.findIndex(img => img.dataset.fullSrc === src);
        openLightbox(index === -1 ? 0 : index);
    }

    const processContainer = document.getElementById('process-images');
    processSrcs.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const img = document.createElement('img');
        img.src = thumbnailSrc(src);
        img.dataset.fullSrc = src;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.alt = 'Irkutsk process ' + (i + 1);
        const overlay = document.createElement('div');
        overlay.className = 'item-overlay';
        
        if (soldPaintings.includes(src)) {
            let extraClass = '';
            if (src.includes('00002')) {
                extraClass = 'sold-higher';
            } else if (src.includes('00001')) {
                extraClass = 'sold-high';
            }
            overlay.innerHTML = `
                <span class="overlay-price ${extraClass}">Sold</span>
            `;
        } else if (paintingInfo[src]) {
            const info = paintingInfo[src];
            overlay.innerHTML = `
                <span class="overlay-price">${info.title}</span>
                <span class="overlay-price">${info.size}</span>
            `;
        } else {
            overlay.innerHTML = '';
        }
        
        item.appendChild(img);
        item.appendChild(overlay);
        processContainer.appendChild(item);
        galleryEntries.push({ item, img, src });
        galleryImages.push(img);
        
        item.addEventListener('click', () => openLightboxForSrc(src));
    });

    // Main gallery — starts at 4 in lightbox
    imageSrcs.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        
        const img = document.createElement('img');
        img.src = thumbnailSrc(src);
        img.dataset.fullSrc = src;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.alt = 'Painting';

        const overlay = document.createElement('div');
        overlay.className = 'item-overlay';
        
        if (soldPaintings.includes(src)) {
            overlay.innerHTML = `
                <span class="overlay-price">Sold</span>
            `;
        } else if (paintingInfo[src]) {
            const info = paintingInfo[src];
            overlay.innerHTML = `
                <span class="overlay-price">${info.title}</span>
                <span class="overlay-price">${info.size}</span>
            `;
        } else {
            overlay.innerHTML = '';
        }

        item.appendChild(img);
        item.appendChild(overlay);
        gallery.appendChild(item);
        galleryEntries.push({ item, img, src });
        galleryImages.push(img);

        item.addEventListener('click', () => openLightboxForSrc(src));
    });

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCounter = document.getElementById('lightbox-counter');
    const closeBtn = document.getElementById('lightbox-close');
    let currentIndex = 0;

    function openLightbox(index) {
        currentIndex = index;
        lightboxImg.src = galleryImages[currentIndex].dataset.fullSrc || galleryImages[currentIndex].src;
        lightboxCounter.textContent = (currentIndex + 1) + ' / ' + galleryImages.length;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
    }
    function showPrev() {
        currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
        lightboxImg.src = galleryImages[currentIndex].dataset.fullSrc || galleryImages[currentIndex].src;
        lightboxCounter.textContent = (currentIndex + 1) + ' / ' + galleryImages.length;
    }
    function showNext() {
        currentIndex = (currentIndex + 1) % galleryImages.length;
        lightboxImg.src = galleryImages[currentIndex].dataset.fullSrc || galleryImages[currentIndex].src;
        lightboxCounter.textContent = (currentIndex + 1) + ' / ' + galleryImages.length;
    }

    closeBtn.addEventListener('mousedown', () => closeBtn.classList.add('clicked'));
    closeBtn.addEventListener('mouseup', () => {
        setTimeout(() => { closeBtn.classList.remove('clicked'); closeLightbox(); }, 80);
    });
    closeBtn.addEventListener('click', closeLightbox);

    ['prev', 'next'].forEach(id => {
        const btn = document.getElementById(id);
        const action = id === 'prev' ? showPrev : showNext;
        btn.addEventListener('mousedown', () => btn.classList.add('clicked'));
        btn.addEventListener('mouseup', () => {
            setTimeout(() => { btn.classList.remove('clicked'); action(); }, 80);
        });
    });

    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'ArrowLeft') showPrev();
        if (e.key === 'ArrowRight') showNext();
        if (e.key === 'Escape') closeLightbox();
    });

    // Swipe navigation for lightbox
    let touchStartX = 0;
    let touchEndX = 0;
    const swipeThreshold = 50;

    lightbox.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    lightbox.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });

    function handleSwipe() {
        const diffX = touchStartX - touchEndX;

        if (Math.abs(diffX) > swipeThreshold) {
            if (diffX > 0) {
                // Swipe left - go to next image
                showNext();
            } else {
                // Swipe right - go to previous image
                showPrev();
            }
        }
    }

    // Back to top
    const backToTop = document.getElementById('back-to-top');
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    window.addEventListener('scroll', () => {
    backToTop.classList.toggle('visible', window.scrollY > 200);
});
    document.getElementById('back-to-top-btn').addEventListener('click', scrollToTop);
    document.getElementById('back-to-top-label').addEventListener('click', scrollToTop);

    // Sparkle trail
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    let cursorHead;

    if (!isTouchDevice) {
        cursorHead = document.createElement('div');
        cursorHead.className = 'cursor-head';
        document.body.appendChild(cursorHead);
    }

    document.addEventListener('mousemove', function(e) {
        // Skip all cursor effects on touch devices
        if (isTouchDevice) return;

        // Move cursor head (only on desktop)
        if (cursorHead) {
            cursorHead.style.left = e.clientX + 'px';
            cursorHead.style.top = e.clientY + 'px';
        }

        // Create sparkle
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        const isAltMode = lightbox.classList.contains('open');
        sparkle.style.backgroundColor = isAltMode ? '#c9607a' : '#1C0218';
        sparkle.style.left = e.clientX + 'px';
        sparkle.style.top = e.clientY + 'px';
        document.body.appendChild(sparkle);
        requestAnimationFrame(() => {
            sparkle.style.transform = 'translateY(-50px) translate(-50%, -50%) scale(0.3)';
            sparkle.style.opacity = '0';
        });
        setTimeout(() => { sparkle.style.backgroundColor = isAltMode ? '#1C0218' : '#c9607a'; }, 300);
        setTimeout(() => { sparkle.remove(); }, 1800);
    });
</script>

</body>
</html>
